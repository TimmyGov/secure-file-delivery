services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=securedelivery;Username=postgres;Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:?set JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE:?set JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      Storage__Provider: Minio
      Storage__Minio__Endpoint: ${MINIO_ENDPOINT:?set MINIO_ENDPOINT}
      Storage__Minio__AccessKey: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      Storage__Minio__SecretKey: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      Storage__Minio__BucketName: ${MINIO_BUCKET_NAME:?set MINIO_BUCKET_NAME}
      Storage__Minio__UseSSL: ${MINIO_USE_SSL:-false}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securedelivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securedelivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
